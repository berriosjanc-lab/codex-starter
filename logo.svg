<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d9ff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00d9ff" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  <g stroke="url(#cyanGradient)" stroke-width="3" fill="none" filter="url(#glow)">
    <path d="M128 256 Q256 160 384 256" opacity="0.5">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M128 256 Q256 180 384 256;M128 256 Q256 140 384 256;M128 256 Q256 180 384 256"/>
    </path>
    <path d="M96 256 Q256 120 416 256" opacity="0.3">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M96 256 Q256 140 416 256;M96 256 Q256 100 416 256;M96 256 Q256 140 416 256"/>
    </path>
    <path d="M160 256 Q256 200 352 256" opacity="0.7">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M160 256 Q256 220 352 256;M160 256 Q256 180 352 256;M160 256 Q256 220 352 256"/>
    </path>
  </g>
  <circle cx="256" cy="256" r="24" fill="#00d9ff" filter="url(#glow)">
    <animate attributeName="r" values="22;28;22" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="256" r="48" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.3" filter="url(#shadow)">
    <animate attributeName="r" values="48;70;48" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
