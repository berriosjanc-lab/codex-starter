<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Respirar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      color: #fff;
      overflow: hidden;
      transition: background 1s ease;
    }

    /* ── BACKGROUNDS ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      transition: opacity 0.8s ease;
    }
    .bg-ocean    { background: linear-gradient(160deg, #0d3b5e 0%, #1a6b8a 40%, #2d9cad 70%, #7ecac4 100%); }
    .bg-forest   { background: linear-gradient(160deg, #0a2e1a 0%, #1a5c2e 40%, #2e8b57 70%, #7fbf7f 100%); }
    .bg-sunset   { background: linear-gradient(160deg, #1a0a2e 0%, #6b2d6b 30%, #c0634d 60%, #f4a460 100%); }
    .bg-mountain { background: linear-gradient(160deg, #1a1a2e 0%, #2d3561 40%, #4a6fa5 70%, #8ab4d4 100%); }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    /* ── SHARED ── */
    .screen {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 60px 28px 40px;
      overflow-y: auto;
      transition: opacity 0.5s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ── SETUP SCREEN ── */
    .logo-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 0 10px rgba(255,255,255,0.12), 0 0 0 20px rgba(255,255,255,0.06);
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-inner {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.85);
    }

    .app-label {
      font-size: 0.75rem; letter-spacing: 4px; color: rgba(255,255,255,0.7);
      text-transform: uppercase; margin-bottom: 4px;
    }
    .app-title {
      font-size: 2.2rem; font-weight: 700; letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .app-subtitle {
      font-style: italic; font-size: 0.95rem; color: rgba(255,255,255,0.75);
      text-align: center; line-height: 1.6; margin-bottom: 36px;
    }

    .section-label {
      font-size: 0.7rem; letter-spacing: 3px; color: rgba(255,255,255,0.6);
      text-transform: uppercase; margin-bottom: 14px; align-self: flex-start;
    }

    /* Duration pills */
    .duration-row {
      display: flex; gap: 12px; margin-bottom: 32px; width: 100%;
    }
    .dur-btn {
      flex: 1; padding: 14px 0; border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75); font-size: 1rem;
      cursor: pointer; transition: all 0.25s;
    }
    .dur-btn.active {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.7);
      color: #fff; font-weight: 600;
    }

    /* Scene cards */
    .scenes-row {
      display: flex; gap: 10px; width: 100%; margin-bottom: 32px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .scenes-row::-webkit-scrollbar { display: none; }
    .scene-card {
      flex: 0 0 110px; height: 130px; border-radius: 18px;
      border: 2px solid transparent;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: flex-end;
      padding: 10px;
      position: relative; overflow: hidden;
    }
    .scene-card.active { border-color: rgba(255,255,255,0.9); }
    .scene-ocean    { background: linear-gradient(160deg, #1a6b8a, #7ecac4); }
    .scene-forest   { background: linear-gradient(160deg, #1a5c2e, #7fbf7f); }
    .scene-sunset   { background: linear-gradient(160deg, #6b2d6b, #f4a460); }
    .scene-mountain { background: linear-gradient(160deg, #2d3561, #8ab4d4); }
    .scene-name {
      font-size: 0.8rem; font-weight: 600; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5); letter-spacing: 0.5px;
    }

    /* Pattern selector */
    .patterns-col { width: 100%; margin-bottom: 36px; }
    .pat-btn {
      width: 100%; padding: 14px 18px; border-radius: 14px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.8); font-size: 0.9rem;
      cursor: pointer; transition: all 0.25s;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .pat-btn.active {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }
    .pat-timing { font-size: 0.75rem; color: rgba(255,255,255,0.55); }
    .pat-btn.active .pat-timing { color: rgba(255,255,255,0.8); }

    /* Begin button */
    .btn-begin {
      width: 100%; padding: 18px;
      border-radius: 50px; border: none;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 1.1rem; font-weight: 600;
      letter-spacing: 1px; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.4);
      transition: all 0.25s;
    }
    .btn-begin:hover { background: rgba(255,255,255,0.32); }

    /* ── SESSION SCREEN ── */
    #sessionScreen {
      justify-content: center; gap: 0;
    }

    .session-top {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 28px 0;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10;
    }
    .btn-end {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 8px 18px; border-radius: 20px;
      font-size: 0.85rem; cursor: pointer;
    }
    .session-timer {
      font-size: 1rem; color: rgba(255,255,255,0.7); letter-spacing: 1px;
    }

    /* Breathing circle */
    .breath-wrap {
      position: relative; width: 260px; height: 260px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 48px;
    }
    .pulse-ring {
      position: absolute; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      animation: pulseRing 3s ease-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 1s; }
    .pulse-ring:nth-child(3) { animation-delay: 2s; }
    @keyframes pulseRing {
      0%   { width: 100px; height: 100px; opacity: 0.6; }
      100% { width: 260px; height: 260px; opacity: 0; }
    }

    .breath-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.9), rgba(255,255,255,0.35));
      box-shadow: 0 0 60px rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.4s ease;
    }

    .breath-circle.inhale {
      animation: breathIn var(--inhale-dur, 4s) ease-in forwards;
    }
    .breath-circle.hold, .breath-circle.hold-out {
      transform: scale(1.7);
    }
    .breath-circle.exhale {
      animation: breathOut var(--exhale-dur, 6s) ease-out forwards;
    }

    @keyframes breathIn  { from { transform: scale(1);   } to { transform: scale(1.7); } }
    @keyframes breathOut { from { transform: scale(1.7); } to { transform: scale(1);   } }

    .breath-phase {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: 1px; text-align: center;
      min-height: 38px; margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .breath-count {
      font-size: 3rem; font-weight: 200;
      min-height: 64px; text-align: center;
      letter-spacing: 2px;
    }
    .breath-cycle {
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
      letter-spacing: 2px; min-height: 22px;
      text-align: center; text-transform: uppercase;
    }

    /* Sound toggle */
    .sound-btn {
      position: fixed; bottom: 36px; right: 28px;
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
  </style>
</head>
<body>

<!-- Backgrounds -->
<div class="bg bg-ocean" id="bg"></div>
<div class="bg-overlay"></div>

<!-- ── SETUP SCREEN ── -->
<div class="screen" id="setupScreen">
  <div class="logo-icon"><div class="logo-inner"></div></div>
  <p class="app-label">Respirar</p>
  <h1 class="app-title">CALMA</h1>
  <p class="app-subtitle">Suelta la ansiedad.<br>Inhala paz y claridad.</p>

  <p class="section-label">\u00bfCu\u00e1nto tiempo?</p>
  <div class="duration-row" id="durRow">
    <button class="dur-btn active" data-min="3">3 min</button>
    <button class="dur-btn" data-min="5">5 min</button>
    <button class="dur-btn" data-min="10">10 min</button>
  </div>

  <p class="section-label">Ambiente visual</p>
  <div class="scenes-row" id="scenesRow">
    <div class="scene-card scene-ocean active" data-scene="ocean">
      <span class="scene-name">Oc\u00e9ano</span>
    </div>
    <div class="scene-card scene-forest" data-scene="forest">
      <span class="scene-name">Bosque</span>
    </div>
    <div class="scene-card scene-sunset" data-scene="sunset">
      <span class="scene-name">Atardecer</span>
    </div>
    <div class="scene-card scene-mountain" data-scene="mountain">
      <span class="scene-name">Monta\u00f1a</span>
    </div>
  </div>

  <p class="section-label">T\u00e9cnica de respiraci\u00f3n</p>
  <div class="patterns-col" id="patternsCol"></div>

  <button class="btn-begin" id="btnBegin">Comenzar Sesi\u00f3n</button>
</div>

<!-- ── SESSION SCREEN ── -->
<div class="screen hidden" id="sessionScreen">
  <div class="session-top">
    <button class="btn-end" id="btnEnd">Terminar</button>
    <span class="session-timer" id="sessionTimer"></span>
  </div>

  <div class="breath-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="breath-circle" id="breathCircle"></div>
  </div>

  <div class="breath-phase" id="breathPhase"></div>
  <div class="breath-count" id="breathCount"></div>
  <div class="breath-cycle" id="breathCycle"></div>

  <button class="sound-btn" id="soundBtn" title="Sonido">&#128264;</button>
</div>

<script>
var PATTERNS = [
  {
    name: 'Respiraci\u00f3n Cuadrada',
    timing: '4 \u2013 4 \u2013 4 \u2013 4',
    phases: [
      { label: 'Inhala',  type: 'inhale',   dur: 4 },
      { label: 'Sost\u00e9n',  type: 'hold',     dur: 4 },
      { label: 'Exhala',  type: 'exhale',   dur: 4 },
      { label: 'Sost\u00e9n',  type: 'hold-out', dur: 4 }
    ]
  },
  {
    name: 'T\u00e9cnica 4-7-8',
    timing: '4 \u2013 7 \u2013 8',
    phases: [
      { label: 'Inhala',  type: 'inhale', dur: 4 },
      { label: 'Sost\u00e9n',  type: 'hold',   dur: 7 },
      { label: 'Exhala',  type: 'exhale', dur: 8 }
    ]
  },
  {
    name: 'Respiraci\u00f3n Calmante',
    timing: '5 \u2013 2 \u2013 7',
    phases: [
      { label: 'Inhala',  type: 'inhale', dur: 5 },
      { label: 'Sost\u00e9n',  type: 'hold',   dur: 2 },
      { label: 'Exhala',  type: 'exhale', dur: 7 }
    ]
  },
  {
    name: 'Energizante',
    timing: '3 \u2013 3',
    phases: [
      { label: 'Inhala', type: 'inhale', dur: 3 },
      { label: 'Exhala', type: 'exhale', dur: 3 }
    ]
  }
];

var SCENES = {
  ocean:    'bg-ocean',
  forest:   'bg-forest',
  sunset:   'bg-sunset',
  mountain: 'bg-mountain'
};

var selectedDuration = 3;
var selectedScene    = 'ocean';
var selectedPattern  = PATTERNS[0];

var running      = false;
var phaseTimer   = null;
var sessionTimer = null;
var phaseIndex   = 0;
var secondsLeft  = 0;
var cycleCount   = 0;
var sessionLeft  = 0;
var soundOn      = true;

// Audio
var audioCtx = null;
var droneNode = null;
var gainNode  = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function startDrone() {
  if (!soundOn) return;
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  gainNode  = ctx.createGain();
  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 2);
  gainNode.connect(ctx.destination);

  droneNode = ctx.createOscillator();
  droneNode.type = 'sine';
  droneNode.frequency.setValueAtTime(174.6, ctx.currentTime);
  droneNode.connect(gainNode);
  droneNode.start();
}

function stopDrone() {
  if (droneNode) {
    try {
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
      droneNode.stop(audioCtx.currentTime + 1);
    } catch(e) {}
    droneNode = null;
    gainNode  = null;
  }
}

function playTone(freq, duration) {
  if (!soundOn) return;
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.3);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration - 0.2);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

// DOM refs
var bg           = document.getElementById('bg');
var setupScreen  = document.getElementById('setupScreen');
var sessionScr   = document.getElementById('sessionScreen');
var breathCircle = document.getElementById('breathCircle');
var breathPhase  = document.getElementById('breathPhase');
var breathCount  = document.getElementById('breathCount');
var breathCycle  = document.getElementById('breathCycle');
var sessionTimerEl = document.getElementById('sessionTimer');
var soundBtn     = document.getElementById('soundBtn');

// Build pattern buttons
var patternsCol = document.getElementById('patternsCol');
PATTERNS.forEach(function(pat, idx) {
  var btn = document.createElement('button');
  btn.className = idx === 0 ? 'pat-btn active' : 'pat-btn';
  btn.innerHTML = '<span>' + pat.name + '</span><span class="pat-timing">' + pat.timing + '</span>';
  btn.addEventListener('click', function() {
    selectedPattern = pat;
    document.querySelectorAll('.pat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  });
  patternsCol.appendChild(btn);
});

// Duration buttons
document.getElementById('durRow').addEventListener('click', function(e) {
  var btn = e.target.closest('.dur-btn');
  if (!btn) return;
  selectedDuration = parseInt(btn.dataset.min, 10);
  document.querySelectorAll('.dur-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
});

// Scene cards
document.getElementById('scenesRow').addEventListener('click', function(e) {
  var card = e.target.closest('.scene-card');
  if (!card) return;
  selectedScene = card.dataset.scene;
  document.querySelectorAll('.scene-card').forEach(function(c) { c.classList.remove('active'); });
  card.classList.add('active');
  bg.className = 'bg ' + SCENES[selectedScene];
});

// Sound toggle
soundBtn.addEventListener('click', function() {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '\uD83D\uDD14' : '\uD83D\uDD15';
  if (!soundOn) stopDrone();
  else if (running) startDrone();
});

// Begin session
document.getElementById('btnBegin').addEventListener('click', function() {
  setupScreen.classList.add('hidden');
  sessionScr.classList.remove('hidden');
  startSession();
});

// End session
document.getElementById('btnEnd').addEventListener('click', function() {
  endSession();
});

function fmtTime(sec) {
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function startSession() {
  running     = true;
  phaseIndex  = 0;
  cycleCount  = 0;
  sessionLeft = selectedDuration * 60;
  breathCycle.textContent = '';
  sessionTimerEl.textContent = fmtTime(sessionLeft);

  startDrone();

  sessionTimer = setInterval(function() {
    sessionLeft--;
    sessionTimerEl.textContent = fmtTime(sessionLeft);
    if (sessionLeft <= 0) {
      endSession();
    }
  }, 1000);

  runPhase();
}

function runPhase() {
  if (!running) return;
  var phase = selectedPattern.phases[phaseIndex];
  secondsLeft = phase.dur;
  document.documentElement.style.setProperty('--inhale-dur', phase.dur + 's');
  document.documentElement.style.setProperty('--exhale-dur', phase.dur + 's');
  breathCircle.className = 'breath-circle ' + phase.type;
  breathPhase.textContent = phase.label;
  breathCount.textContent = secondsLeft;

  if (phase.type === 'inhale') playTone(396, phase.dur);
  else if (phase.type === 'exhale') playTone(285, phase.dur);
  else playTone(432, phase.dur);

  phaseTimer = setInterval(function() {
    secondsLeft--;
    breathCount.textContent = secondsLeft > 0 ? secondsLeft : '';
    if (secondsLeft <= 0) {
      clearInterval(phaseTimer);
      phaseIndex++;
      if (phaseIndex >= selectedPattern.phases.length) {
        phaseIndex = 0;
        cycleCount++;
        breathCycle.textContent = 'Ciclo ' + cycleCount;
      }
      runPhase();
    }
  }, 1000);
}

function endSession() {
  running = false;
  clearInterval(phaseTimer);
  clearInterval(sessionTimer);
  stopDrone();

  breathCircle.className = 'breath-circle';
  breathPhase.textContent = 'Sesi\u00f3n completa';
  breathCount.textContent = '';

  setTimeout(function() {
    sessionScr.classList.add('hidden');
    setupScreen.classList.remove('hidden');
    breathPhase.textContent = '';
    breathCycle.textContent = '';
  }, 2500);
}
</script>
</body>
</html>
