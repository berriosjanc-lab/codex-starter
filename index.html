<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Respirar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root { --ease: cubic-bezier(.4,0,.2,1); }

    body {
      min-height: 100vh;
      font-family: 'Josefin Sans', -apple-system, sans-serif;
      color: #fff; overflow: hidden;
    }

    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(155deg,#0d2137 0%,#0e3d52 35%,#145c6e 65%,#1a7a8a 100%);
      transition: background 1.4s var(--ease);
    }
    #bg.forest  { background: linear-gradient(155deg,#040e08 0%,#0a2010 35%,#12341a 65%,#1a4a22 100%); }
    #bg.sunset  { background: linear-gradient(155deg,#1a0535 0%,#7b1a5a 35%,#d44a30 65%,#f0a040 100%); }
    #bg.night   { background: linear-gradient(155deg,#020210 0%,#06062a 35%,#0a0a38 65%,#10104a 100%); }
    #bg::after {
      content:''; position:absolute; inset:0;
      background: rgba(0,0,0,0.3);
    }

    .screen {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px 36px;
      overflow-y: auto;
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.out  { opacity:0; transform:translateY(-20px); pointer-events:none; }
    .screen.below{ opacity:0; transform:translateY(20px);  pointer-events:none; }

    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin-bottom: 18px; margin-top: 4px;
    }
    .rings {
      width: 58px; height: 58px;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .rings i {
      position: absolute; border-radius: 50%; display: block;
      border: 1.5px solid rgba(255,255,255,0.45);
    }
    .rings i:nth-child(1){ width:58px; height:58px; border-color:rgba(255,255,255,0.2); }
    .rings i:nth-child(2){ width:40px; height:40px; border-color:rgba(255,255,255,0.38); }
    .rings i:nth-child(3){ width:22px; height:22px; background:rgba(255,255,255,0.85); border:none; }
    .logo-lbl {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 6px; text-transform: uppercase;
      color: rgba(255,255,255,0.45); font-weight: 300;
    }

    .h-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.6rem; font-weight: 300; letter-spacing: 10px;
      margin-bottom: 10px; text-align: center;
    }
    .h-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.2rem; line-height: 1.85;
      color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 38px;
      font-weight: 300;
    }

    .sec-lbl {
      align-self: flex-start;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 12px; font-weight: 300;
    }

    .dur-row { display:flex; gap:10px; width:100%; margin-bottom:28px; }
    .dur-btn {
      flex:1; padding:15px 0; border-radius:14px;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
      color:rgba(255,255,255,0.6); font-size:0.95rem; cursor:pointer;
      transition:all 0.22s var(--ease); font-family:inherit;
    }
    .dur-btn.on {
      background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.6);
      color:#fff; font-weight:600;
    }

    .scenes-row { display:flex; gap:8px; width:100%; margin-bottom:28px; }
    .sc {
      flex:1; border-radius:16px; cursor:pointer;
      position:relative; overflow:hidden;
      border:2px solid transparent;
      transition:border-color 0.25s, transform 0.18s;
      min-height:96px;
    }
    .sc.on { border-color:rgba(255,255,255,0.9); }
    .sc:active { transform:scale(0.95); }
    .sc svg { position:absolute; inset:0; width:100%; height:100%; display:block; }
    .sc-overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom:9px; pointer-events:none;
    }
    .sc-dot {
      width:18px; height:18px; border-radius:50%;
      background:rgba(255,255,255,0.2);
      border:1.5px solid rgba(255,255,255,0.7);
      margin-bottom:5px;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; color:#fff;
    }
    .sc.on .sc-dot { background:#fff; color:#333; }
    .sc-name {
      font-size:0.65rem; font-weight:600; color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,0.7);
      letter-spacing:0.5px; text-align:center;
      font-family:'Josefin Sans',sans-serif;
    }

    .pat-list { width:100%; margin-bottom:30px; }
    .pat-btn {
      width:100%; padding:15px 18px; border-radius:14px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.65); cursor:pointer;
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:8px; font-family:inherit;
      transition:all 0.2s var(--ease);
    }
    .pat-btn .pn { font-size:0.9rem; }
    .pat-btn .pt { font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:0.5px; }
    .pat-btn.on {
      background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.5);
      color:#fff;
    }
    .pat-btn.on .pt { color:rgba(255,255,255,0.65); }

    .btn-begin {
      width:100%; padding:20px; border-radius:50px;
      background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.38);
      color:#fff; font-size:0.85rem; font-weight:400; letter-spacing:4px;
      text-transform: uppercase;
      cursor:pointer; font-family:'Josefin Sans',sans-serif;
      transition:all 0.22s var(--ease);
      -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    }
    .btn-begin:active { background:rgba(255,255,255,0.26); transform:scale(0.98); }

    #sess { justify-content:center; padding-top:0; }

    .sess-hdr {
      position:fixed; top:0; left:0; right:0;
      padding:52px 24px 0;
      display:flex; justify-content:space-between; align-items:center;
      z-index:10;
    }
    .btn-end {
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25);
      color:rgba(255,255,255,0.8); padding:9px 20px; border-radius:20px;
      font-size:0.85rem; cursor:pointer; font-family:inherit;
    }
    .sess-clock {
      font-size:0.95rem; font-weight:300; letter-spacing:2px;
      color:rgba(255,255,255,0.55);
    }

    .stage {
      position:relative; width:280px; height:280px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:48px;
    }
    .aura {
      position:absolute; border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 70%);
      animation:aura 4.5s ease-in-out infinite;
    }
    .aura:nth-child(1){ width:280px; height:280px; }
    .aura:nth-child(2){ width:200px; height:200px; animation-delay:.7s; animation-duration:5.5s; }
    @keyframes aura {
      0%,100%{ opacity:.5; transform:scale(.94); }
      50%{ opacity:1; transform:scale(1.04); }
    }
    .ring1 { position:absolute; width:210px; height:210px; border-radius:50%; border:1px solid rgba(255,255,255,0.14); }
    .ring2 { position:absolute; width:162px; height:162px; border-radius:50%; border:1px solid rgba(255,255,255,0.09); }

    .orb {
      width:108px; height:108px; border-radius:50%; z-index:2;
      background:radial-gradient(circle at 36% 32%,rgba(255,255,255,.95) 0%,rgba(255,255,255,.5) 55%,rgba(255,255,255,.2) 100%);
      box-shadow:0 0 55px rgba(255,255,255,.22),0 0 110px rgba(255,255,255,.08);
      transition:transform .4s ease;
    }
    .orb.inhale  { animation:cIn  var(--iDur,4s) ease-in  forwards; }
    .orb.hold    { transform:scale(1.72); }
    .orb.holdout { transform:scale(1.72); }
    .orb.exhale  { animation:cOut var(--eDur,6s) ease-out forwards; }
    @keyframes cIn  { from{transform:scale(1)}    to{transform:scale(1.72)} }
    @keyframes cOut { from{transform:scale(1.72)} to{transform:scale(1)}    }

    .s-phase {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300; letter-spacing: 3px;
      text-align: center; min-height: 44px; margin-bottom: 4px;
      font-style: italic;
    }
    .s-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; font-weight: 300; letter-spacing: 4px;
      min-height: 80px; text-align: center;
    }
    .s-cycle {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); text-align: center; min-height: 20px;
      font-weight: 300;
    }

    .fab {
      position:fixed; bottom:36px; right:24px;
      width:46px; height:46px; border-radius:50%;
      background:rgba(255,255,255,0.11); border:1px solid rgba(255,255,255,0.22);
      color:#fff; font-size:1.1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      z-index:10; font-family:inherit;
    }
    .fab.off { opacity:.4; }
  </style>
</head>
<body>

<div id="bg"></div>

<div class="screen" id="setup">
  <div class="logo-wrap">
    <div class="rings"><i></i><i></i><i></i></div>
    <span class="logo-lbl">Respirar</span>
  </div>
  <h1 class="h-title">CALMA</h1>
  <p class="h-sub">Suelta la ansiedad.<br>Inhala paz y claridad.</p>

  <p class="sec-lbl">&iquest;Cu&aacute;nto tiempo?</p>
  <div class="dur-row" id="durRow">

  <p class="sec-lbl">Ambiente visual</p>
  <div class="scenes-row" id="scenesRow">

        <defs><linearGradient id="nSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#020214"/><stop offset="100%" stop-color="#0c0c38"/></linearGradient></defs>
        <rect width="80" height="96" fill="url(#nSky)"/>
        <circle cx="8" cy="10" r="0.8" fill="#fff" opacity="0.95"/><circle cx="18" cy="5" r="1.1" fill="#fff"/><circle cx="32" cy="13" r="0.7" fill="#fff" opacity="0.8"/><circle cx="47" cy="7" r="0.9" fill="#fff"/><circle cx="58" cy="15" r="0.6" fill="#fff" opacity="0.7"/><circle cx="70" cy="4" r="1.0" fill="#fff"/><circle cx="74" cy="20" r="0.7" fill="#fff" opacity="0.9"/><circle cx="25" cy="26" r="0.6" fill="#fff" opacity="0.6"/><circle cx="42" cy="20" r="0.8" fill="#fff"/><circle cx="62" cy="28" r="0.5" fill="#fff" opacity="0.7"/><circle cx="12" cy="33" r="0.5" fill="#fff" opacity="0.5"/><circle cx="78" cy="11" r="0.6" fill="#fff" opacity="0.8"/><circle cx="40" cy="30" r="1.2" fill="#fff" opacity="0.9"/>
        <circle cx="60" cy="22" r="11" fill="#fffbe6"/><circle cx="66" cy="16" r="10" fill="#0c0c38"/>
        <polygon points="0,96 0,72 14,52 28,72 28,96" fill="#050518"/><polygon points="18,96 18,62 38,38 58,62 58,96" fill="#080825"/><polygon points="48,96 48,68 64,50 80,68 80,96" fill="#050518"/>
      </svg>
      <div class="sc-overlay"><div class="sc-dot">&#10003;</div><span class="sc-name">Noche</span></div>
    </div>
    <div class="sc" data-s="forest">
      <svg viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="oSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a1f3a"/><stop offset="50%" stop-color="#0e3d70"/><stop offset="100%" stop-color="#0a5a80"/></linearGradient><linearGradient id="oSea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d5a80"/><stop offset="100%" stop-color="#062840"/></linearGradient><radialGradient id="oMG" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fffde7" stop-opacity="0.4"/><stop offset="100%" stop-color="#fffde7" stop-opacity="0"/></radialGradient></defs>
        <rect width="80" height="96" fill="url(#oSky)"/>
        <circle cx="10" cy="8" r="0.7" fill="#fff" opacity="0.7"/><circle cx="25" cy="5" r="0.6" fill="#fff" opacity="0.6"/><circle cx="65" cy="10" r="0.8" fill="#fff" opacity="0.8"/><circle cx="72" cy="6" r="0.6" fill="#fff" opacity="0.7"/><circle cx="50" cy="14" r="0.5" fill="#fff" opacity="0.6"/>
        <circle cx="40" cy="22" r="16" fill="url(#oMG)"/><circle cx="40" cy="22" r="9" fill="#fffde7" opacity="0.92"/>
        <rect x="37" y="45" width="6" height="3" rx="2" fill="#fffde7" opacity="0.3"/><rect x="36" y="50" width="8" height="2" rx="1" fill="#fffde7" opacity="0.2"/>
        <rect x="0" y="48" width="80" height="48" fill="url(#oSea)"/>
        <path d="M0,54 Q10,50 20,54 Q30,58 40,54 Q50,50 60,54 Q70,58 80,54 L80,96 L0,96 Z" fill="#0e6090" opacity="0.8"/><path d="M0,64 Q12,60 24,64 Q36,68 48,64 Q60,60 72,64 Q76,66 80,64 L80,96 L0,96 Z" fill="#0c5070" opacity="0.9"/><path d="M0,76 Q15,72 30,76 Q45,80 60,76 Q70,73 80,76 L80,96 L0,96 Z" fill="#084060"/>
      </svg>
      <div class="sc-overlay"><div class="sc-dot"></div><span class="sc-name">Oc&eacute;ano</span></div>
    </div>
    <div class="sc" data-s="sunset">
      <svg viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="fSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#020e05"/><stop offset="100%" stop-color="#0a2812"/></linearGradient></defs>
        <rect width="80" height="96" fill="url(#fSky)"/>
        <circle cx="20" cy="7" r="0.8" fill="#fff" opacity="0.8"/><circle cx="40" cy="4" r="1.0" fill="#fff"/><circle cx="58" cy="9" r="0.7" fill="#fff" opacity="0.7"/><circle cx="30" cy="18" r="0.6" fill="#fff" opacity="0.6"/><circle cx="68" cy="5" r="0.8" fill="#fff" opacity="0.9"/>
        <circle cx="62" cy="18" r="8" fill="#fffbe6" opacity="0.85"/><circle cx="67" cy="13" r="7" fill="#0a2812"/>
        <polygon points="0,96 0,68 8,52 16,68 16,96" fill="#041008"/><polygon points="12,96 12,62 21,44 30,62 30,96" fill="#061410"/><polygon points="52,96 52,65 60,48 68,65 68,96" fill="#041008"/><polygon points="64,96 64,60 73,43 80,55 80,96" fill="#061410"/>
        <polygon points="22,96 22,55 34,30 46,55 46,96" fill="#020c06"/><polygon points="40,96 40,52 54,26 68,52 68,96" fill="#030e08"/>
        <rect x="0" y="85" width="80" height="11" fill="#020c06"/>
      </svg>
      <div class="sc-overlay"><div class="sc-dot"></div><span class="sc-name">Bosque</span></div>
    </div>
    <div class="sc" data-s="night">
      <svg viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0430"/><stop offset="30%" stop-color="#8a1850"/><stop offset="62%" stop-color="#d44030"/><stop offset="100%" stop-color="#f09030"/></linearGradient><radialGradient id="sGlow" cx="50%" cy="68%" r="45%"><stop offset="0%" stop-color="#ffe060" stop-opacity="0.7"/><stop offset="100%" stop-color="#ff6020" stop-opacity="0"/></radialGradient></defs>
        <rect width="80" height="96" fill="url(#sSky)"/>
        <ellipse cx="40" cy="65" rx="36" ry="22" fill="url(#sGlow)"/>
        <circle cx="40" cy="66" r="10" fill="#ffe050"/>
        <rect x="0" y="66" width="80" height="30" fill="#1a0430"/>
        <ellipse cx="18" cy="28" rx="13" ry="5" fill="rgba(200,70,110,0.45)"/><ellipse cx="62" cy="22" rx="14" ry="5.5" fill="rgba(180,60,100,0.38)"/><ellipse cx="42" cy="36" rx="10" ry="4" fill="rgba(220,90,70,0.35)"/>

    </div>
  </div>

  <p class="sec-lbl">T&eacute;cnica de respiraci&oacute;n</p>
  <div class="pat-list" id="patList"></div>
  <button class="btn-begin" id="btnBegin">Comenzar Sesi&oacute;n</button>
</div>

<div class="screen below" id="sess">
  <div class="sess-hdr">
    <button class="btn-end" id="btnEnd">Terminar</button>
    <span class="sess-clock" id="clock"></span>
  </div>
  <div class="stage">
    <div class="aura"></div><div class="aura"></div>
    <div class="ring1"></div><div class="ring2"></div>
    <div class="orb" id="orb"></div>
  </div>
  <div class="s-phase" id="sPhase"></div>
  <div class="s-count" id="sCount"></div>
  <div class="s-cycle" id="sCycle"></div>
  <button class="fab" id="fab">&#128276;</button>
</div>

<script>
var PATS = [
  { name:'Respiraci\u00f3n Cuadrada', timing:'4\u20134\u20134\u20134',
    phases:[{l:'Inhala',t:'inhale',d:4},{l:'Sost\u00e9n',t:'hold',d:4},{l:'Exhala',t:'exhale',d:4},{l:'Sost\u00e9n',t:'holdout',d:4}] },
  { name:'T\u00e9cnica 4-7-8', timing:'4\u20137\u20138',
    phases:[{l:'Inhala',t:'inhale',d:4},{l:'Sost\u00e9n',t:'hold',d:7},{l:'Exhala',t:'exhale',d:8}] },
  { name:'Respiraci\u00f3n Calmante', timing:'5\u20132\u20137',
    phases:[{l:'Inhala',t:'inhale',d:5},{l:'Sost\u00e9n',t:'hold',d:2},{l:'Exhala',t:'exhale',d:7}] },
  { name:'Energizante', timing:'3\u20133',
    phases:[{l:'Inhala',t:'inhale',d:3},{l:'Exhala',t:'exhale',d:3}] }
];
var BG={ocean:'',forest:'forest',sunset:'sunset',night:'night'};
var cfg={dur:3,scene:'ocean',pat:PATS[0]};
var state={on:false,pIdx:0,sec:0,cyc:0,sessLeft:0};
var tPhase=null,tSess=null,soundOn=true;
var actx=null,ambiGain=null,ambiNodes=[];
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function mkReverb(c,s){var len=c.sampleRate*s,buf=c.createBuffer(2,len,c.sampleRate);for(var ch=0;ch<2;ch++){var d=buf.getChannelData(ch);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);}var conv=c.createConvolver();conv.buffer=buf;return conv;}
function startAmbience(){if(!soundOn)return;var c=getCtx();ambiGain=c.createGain();ambiGain.gain.setValueAtTime(0,c.currentTime);ambiGain.gain.linearRampToValueAtTime(0.2,c.currentTime+3);var rev=mkReverb(c,4),revG=c.createGain();revG.gain.value=0.55;ambiGain.connect(rev);rev.connect(revG);revG.connect(c.destination);ambiGain.connect(c.destination);[110,165,220,330].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain(),lfo=c.createOscillator(),lG=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0.065/(i+1);lfo.frequency.value=0.04+i*0.018;lG.gain.value=1.2;lfo.connect(lG);lG.connect(o.frequency);lfo.start();o.connect(g);g.connect(ambiGain);o.start();ambiNodes.push(o,lfo);});var bLen=c.sampleRate*3,nBuf=c.createBuffer(1,bLen,c.sampleRate),nd=nBuf.getChannelData(0);for(var i=0;i<bLen;i++)nd[i]=Math.random()*2-1;var ns=c.createBufferSource();ns.buffer=nBuf;ns.loop=true;var lpf=c.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=260;var nG=c.createGain();nG.gain.value=0.06;ns.connect(lpf);lpf.connect(nG);nG.connect(ambiGain);ns.start();ambiNodes.push(ns);}
function stopAmbience(){if(!ambiGain||!actx)return;ambiGain.gain.linearRampToValueAtTime(0,actx.currentTime+1.5);var nodes=ambiNodes.slice();ambiNodes=[];setTimeout(function(){nodes.forEach(function(n){try{n.stop();}catch(e){}});ambiGain=null;},1600);}
function chime(freq,dur){if(!soundOn)return;var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.13,c.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);}
var patList=document.getElementById('patList');
PATS.forEach(function(p,i){var b=document.createElement('button');b.className='pat-btn'+(i===0?' on':'');b.innerHTML='<span class="pn">'+p.name+'</span><span class="pt">'+p.timing+'</span>';b.addEventListener('click',function(){cfg.pat=p;patList.querySelectorAll('.pat-btn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');});patList.appendChild(b);});
document.getElementById('durRow').addEventListener('click',function(e){var b=e.target.closest('.dur-btn');if(!b)return;cfg.dur=parseInt(b.dataset.m,10);document.querySelectorAll('.dur-btn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');});
document.getElementById('scenesRow').addEventListener('click',function(e){var card=e.target.closest('.sc');if(!card)return;cfg.scene=card.dataset.s;document.querySelectorAll('.sc').forEach(function(x){x.classList.remove('on');var dot=x.querySelector('.sc-dot');if(dot)dot.innerHTML='';});card.classList.add('on');var dot=card.querySelector('.sc-dot');if(dot)dot.innerHTML='&#10003;';var bg=document.getElementById('bg');bg.className=BG[cfg.scene]||'';bg.id='bg';});
document.getElementById('fab').addEventListener('click',function(){soundOn=!soundOn;this.textContent=soundOn?'\uD83D\uDD14':'\uD83D\uDD15';this.classList.toggle('off',!soundOn);if(!soundOn)stopAmbience();else if(state.on)startAmbience();});
document.getElementById('btnBegin').addEventListener('click',function(){getCtx();document.getElementById('setup').classList.add('out');document.getElementById('sess').classList.remove('below');begin();});
document.getElementById('btnEnd').addEventListener('click',finish);
function fmt(s){var m=Math.floor(s/60),ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
function begin(){state.on=true;state.pIdx=0;state.cyc=0;state.sessLeft=cfg.dur*60;document.getElementById('sCycle').textContent='';document.getElementById('clock').textContent=fmt(state.sessLeft);startAmbience();tSess=setInterval(function(){state.sessLeft--;document.getElementById('clock').textContent=fmt(state.sessLeft);if(state.sessLeft<=0)finish();},1000);runPhase();}
function runPhase(){if(!state.on)return;var ph=cfg.pat.phases[state.pIdx];state.sec=ph.d;document.documentElement.style.setProperty('--iDur',ph.d+'s');document.documentElement.style.setProperty('--eDur',ph.d+'s');document.getElementById('orb').className='orb '+ph.t;document.getElementById('sPhase').textContent=ph.l;document.getElementById('sCount').textContent=state.sec;if(ph.t==='inhale')chime(528,1.1);else if(ph.t==='exhale')chime(396,1.1);else chime(432,0.7);tPhase=setInterval(function(){state.sec--;document.getElementById('sCount').textContent=state.sec>0?state.sec:'';if(state.sec<=0){clearInterval(tPhase);state.pIdx++;if(state.pIdx>=cfg.pat.phases.length){state.pIdx=0;state.cyc++;document.getElementById('sCycle').textContent='Ciclo '+state.cyc;}runPhase();}},1000);}
function finish(){state.on=false;clearInterval(tPhase);clearInterval(tSess);stopAmbience();document.getElementById('orb').className='orb';document.getElementById('sPhase').textContent='Sesi\u00f3n completa';document.getElementById('sCount').textContent='';document.getElementById('sCycle').textContent=state.cyc+(state.cyc===1?' ciclo':' ciclos');setTimeout(function(){document.getElementById('sess').classList.add('below');document.getElementById('setup').classList.remove('out');document.getElementById('sPhase').textContent='';document.getElementById('sCycle').textContent='';},3000);}
</script>
