<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Respirar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root { --ease: cubic-bezier(.4,0,.2,1); }

    body {
      min-height: 100vh;
      font-family: 'Josefin Sans', -apple-system, sans-serif;
      color: #fff; overflow: hidden;
    }

    /* BACKGROUND */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(155deg,#0d2137 0%,#0e3d52 35%,#145c6e 65%,#1a7a8a 100%);
      transition: background 1.4s var(--ease);
    }
    #bg.forest  { background: linear-gradient(155deg,#040e08 0%,#0a2010 35%,#12341a 65%,#1a4a22 100%); }
    #bg.sunset  { background: linear-gradient(155deg,#1a0535 0%,#7b1a5a 35%,#d44a30 65%,#f0a040 100%); }
    #bg.night   { background: linear-gradient(155deg,#020210 0%,#06062a 35%,#0a0a38 65%,#10104a 100%); }
    #bg::after {
      content:''; position:absolute; inset:0;
      background: rgba(0,0,0,0.3);
    }

    /* SCREENS */
    .screen {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px 36px;
      overflow-y: auto;
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.out  { opacity:0; transform:translateY(-20px); pointer-events:none; }
    .screen.below{ opacity:0; transform:translateY(20px);  pointer-events:none; }

    /* LOGO */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin-bottom: 18px; margin-top: 4px;
    }
    .rings {
      width: 58px; height: 58px;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .rings i {
      position: absolute; border-radius: 50%; display: block;
      border: 1.5px solid rgba(255,255,255,0.45);
    }
    .rings i:nth-child(1){ width:58px; height:58px; border-color:rgba(255,255,255,0.2); }
    .rings i:nth-child(2){ width:40px; height:40px; border-color:rgba(255,255,255,0.38); }
    .rings i:nth-child(3){ width:22px; height:22px; background:rgba(255,255,255,0.85); border:none; }
    .logo-lbl {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 6px; text-transform: uppercase;
      color: rgba(255,255,255,0.45); font-weight: 300;
    }

    .h-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.6rem; font-weight: 300; letter-spacing: 10px;
      margin-bottom: 10px; text-align: center;
    }
    .h-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.2rem; line-height: 1.85;
      color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 38px;
      font-weight: 300;
    }

    .sec-lbl {
      align-self: flex-start;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 12px; font-weight: 300;
    }

    /* DURATION */
    .dur-row { display:flex; gap:10px; width:100%; margin-bottom:28px; }
    .dur-btn {
      flex:1; padding:15px 0; border-radius:14px;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
      color:rgba(255,255,255,0.6); font-size:0.95rem; cursor:pointer;
      transition:all 0.22s var(--ease); font-family:inherit;
    }
    .dur-btn.on {
      background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.6);
      color:#fff; font-weight:600;
    }

    /* SCENE CARDS */
    .scenes-row { display:flex; gap:8px; width:100%; margin-bottom:28px; }
    .sc {
      flex:1; border-radius:16px; cursor:pointer;
      position:relative; overflow:hidden;
      border:2px solid transparent;
      transition:border-color 0.25s, transform 0.18s;
      min-height:96px;
    }
    .sc.on { border-color:rgba(255,255,255,0.9); }
    .sc:active { transform:scale(0.95); }
    .sc svg { position:absolute; inset:0; width:100%; height:100%; display:block; }
    .sc-overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom:9px; pointer-events:none;
    }
    .sc-dot {
      width:18px; height:18px; border-radius:50%;
      background:rgba(255,255,255,0.2);
      border:1.5px solid rgba(255,255,255,0.7);
      margin-bottom:5px;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; color:#fff;
    }
    .sc.on .sc-dot { background:#fff; color:#333; }
    .sc-name {
      font-size:0.65rem; font-weight:600; color:#fff;
      text-shadow:0 1px 6px rgba(0,0,0,0.7);
      letter-spacing:0.5px; text-align:center;
      font-family:'Josefin Sans',sans-serif;
    }

    /* PATTERNS */
    .pat-list { width:100%; margin-bottom:30px; }
    .pat-btn {
      width:100%; padding:15px 18px; border-radius:14px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      color:rgba(255,255,255,0.65); cursor:pointer;
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:8px; font-family:inherit;
      transition:all 0.2s var(--ease);
    }
    .pat-btn .pn { font-size:0.9rem; }
    .pat-btn .pt { font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:0.5px; }
    .pat-btn.on {
      background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.5);
      color:#fff;
    }
    .pat-btn.on .pt { color:rgba(255,255,255,0.65); }

    /* BEGIN */
    .btn-begin {
      width:100%; padding:20px; border-radius:50px;
      background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.38);
      color:#fff; font-size:0.85rem; font-weight:400; letter-spacing:4px;
      text-transform: uppercase;
      cursor:pointer; font-family:'Josefin Sans',sans-serif;
      transition:all 0.22s var(--ease);
      -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    }
    .btn-begin:active { background:rgba(255,255,255,0.26); transform:scale(0.98); }

    /* SESSION */
    #sess { justify-content:center; padding-top:0; }

    .sess-hdr {
      position:fixed; top:0; left:0; right:0;
      padding:52px 24px 0;
      display:flex; justify-content:space-between; align-items:center;
      z-index:10;
    }
    .btn-end {
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25);
      color:rgba(255,255,255,0.8); padding:9px 20px; border-radius:20px;
      font-size:0.85rem; cursor:pointer; font-family:inherit;
    }
    .sess-clock {
      font-size:0.95rem; font-weight:300; letter-spacing:2px;
      color:rgba(255,255,255,0.55);
    }

    /* CIRCLE */
    .stage {
      position:relative; width:280px; height:280px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:48px;
    }
    .aura {
      position:absolute; border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 70%);
      animation:aura 4.5s ease-in-out infinite;
    }
    .aura:nth-child(1){ width:280px; height:280px; }
    .aura:nth-child(2){ width:200px; height:200px; animation-delay:.7s; animation-duration:5.5s; }
    @keyframes aura {
      0%,100%{ opacity:.5; transform:scale(.94); }
      50%{ opacity:1; transform:scale(1.04); }
    }
    .ring1 { position:absolute; width:210px; height:210px; border-radius:50%; border:1px solid rgba(255,255,255,0.14); }
    .ring2 { position:absolute; width:162px; height:162px; border-radius:50%; border:1px solid rgba(255,255,255,0.09); }

    .orb {
      width:108px; height:108px; border-radius:50%; z-index:2;
      background:radial-gradient(circle at 36% 32%,rgba(255,255,255,.95) 0%,rgba(255,255,255,.5) 55%,rgba(255,255,255,.2) 100%);
      box-shadow:0 0 55px rgba(255,255,255,.22),0 0 110px rgba(255,255,255,.08);
      transition:transform .4s ease;
    }
    .orb.inhale  { animation:cIn  var(--iDur,4s) ease-in  forwards; }
    .orb.hold    { transform:scale(1.72); }
    .orb.holdout { transform:scale(1.72); }
    .orb.exhale  { animation:cOut var(--eDur,6s) ease-out forwards; }
    @keyframes cIn  { from{transform:scale(1)}    to{transform:scale(1.72)} }
    @keyframes cOut { from{transform:scale(1.72)} to{transform:scale(1)}    }

    .s-phase {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300; letter-spacing: 3px;
      text-align: center; min-height: 44px; margin-bottom: 4px;
      font-style: italic;
    }
    .s-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; font-weight: 300; letter-spacing: 4px;
      min-height: 80px; text-align: center;
    }
    .s-cycle {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.38); text-align: center; min-height: 20px;
      font-weight: 300;
    }

    .fab {
      position:fixed; bottom:36px; right:24px;
      width:46px; height:46px; border-radius:50%;
      background:rgba(255,255,255,0.11); border:1px solid rgba(255,255,255,0.22);
      color:#fff; font-size:1.1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      z-index:10; font-family:inherit;
    }
    .fab.off { opacity:.4; }

    /* ===== ANIMATED SCENE BACKGROUNDS ===== */
    #sceneBg { position:absolute; inset:0; z-index:0; overflow:hidden; border-radius:inherit; }
    .sbg { position:absolute; inset:0; opacity:0; transition:opacity 1.8s ease; }
    .sbg.active { opacity:1; }

    /* --- NOCHE (luna + agua) --- */
    #sbg-ocean { background:radial-gradient(ellipse at 50% 45%, #1c1248 0%, #0c0828 50%, #050318 100%); }
    .n-moon {
      position:absolute; top:18%; left:50%; transform:translateX(-50%);
      width:88px; height:88px; border-radius:50%;
      background:radial-gradient(circle at 36% 36%, #fffce8, #ffd060 55%, #ffaa30);
      box-shadow:0 0 32px 16px rgba(255,185,40,.32),0 0 90px 48px rgba(255,145,0,.13);
      animation:moonPulse 5s ease-in-out infinite alternate;
    }
    @keyframes moonPulse{
      from{box-shadow:0 0 32px 16px rgba(255,185,40,.25),0 0 90px 48px rgba(255,145,0,.1);}
      to{box-shadow:0 0 52px 26px rgba(255,200,60,.42),0 0 120px 65px rgba(255,160,20,.2);}
    }
    .n-stars {
      position:absolute; inset:0;
      background:
        radial-gradient(1px 1px at 12% 8%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 28% 5%, #fff, transparent),
        radial-gradient(1px 1px at 43% 12%, #fff, transparent),
        radial-gradient(1px 1px at 67% 6%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 81% 10%, #fff, transparent),
        radial-gradient(1px 1px at 92% 4%, #fff, transparent),
        radial-gradient(1px 1px at 8% 18%, #fff, transparent),
        radial-gradient(1px 1px at 35% 22%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 55% 16%, #fff, transparent),
        radial-gradient(1px 1px at 74% 20%, #fff, transparent),
        radial-gradient(1px 1px at 88% 25%, #fff, transparent),
        radial-gradient(1px 1px at 18% 30%, #fff, transparent),
        radial-gradient(1px 1px at 62% 28%, #fff, transparent),
        radial-gradient(1px 1px at 95% 32%, #fff, transparent),
        radial-gradient(1px 1px at 5% 38%, #fff, transparent),
        radial-gradient(1px 1px at 40% 35%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 78% 38%, #fff, transparent);
      animation:starTwinkle 4s ease-in-out infinite alternate;
    }
    .n-stars::after {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(1px 1px at 22% 42%, #fff, transparent),
        radial-gradient(1px 1px at 48% 44%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 70% 40%, #fff, transparent),
        radial-gradient(1px 1px at 85% 48%, #fff, transparent),
        radial-gradient(1px 1px at 15% 52%, #fff, transparent),
        radial-gradient(1px 1px at 58% 50%, #fff, transparent),
        radial-gradient(1px 1px at 3% 56%, #fff, transparent),
        radial-gradient(1px 1px at 30% 58%, #fff, transparent);
      animation:starTwinkle 6s ease-in-out infinite alternate-reverse;
    }
    @keyframes starTwinkle{
      from{opacity:1;} 50%{opacity:.45;} to{opacity:.9;}
    }
    .n-water {
      position:absolute; bottom:0; left:0; right:0; height:40%;
      background:linear-gradient(180deg,#0d1f3a 0%,#070f20 100%);
    }
    .n-refl {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:100px; height:40%;
      background:linear-gradient(0deg,rgba(255,155,20,.06) 0%,rgba(255,175,40,.2) 60%,rgba(255,190,55,.1) 100%);
      filter:blur(4px);
      animation:reflWave 3.5s ease-in-out infinite alternate;
    }
    .n-refl::before{
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 9px 14px at 48% 25%, rgba(255,195,45,.65), transparent),
        radial-gradient(ellipse 7px 11px at 53% 40%, rgba(255,175,35,.55), transparent),
        radial-gradient(ellipse 11px 17px at 47% 57%, rgba(255,185,40,.45), transparent),
        radial-gradient(ellipse 8px 13px at 52% 70%, rgba(255,165,28,.38), transparent),
        radial-gradient(ellipse 6px 9px at 49% 82%, rgba(255,155,22,.3), transparent),
        radial-gradient(ellipse 9px 14px at 54% 90%, rgba(255,148,18,.22), transparent),
        radial-gradient(ellipse 7px 11px at 46% 35%, rgba(255,188,42,.4), transparent),
        radial-gradient(ellipse 5px 8px at 51% 62%, rgba(255,178,36,.35), transparent);
      animation:bokehAnim 4s ease-in-out infinite alternate;
    }
    @keyframes reflWave{from{width:85px;opacity:.85;} to{width:118px;opacity:1;}}
    @keyframes bokehAnim{from{transform:scaleX(.88) translateY(3px);opacity:.75;} to{transform:scaleX(1.18) translateY(-3px);opacity:1;}}
    .n-branches {
      position:absolute; top:0; right:0; width:62%; height:65%; pointer-events:none;
    }
    .n-branches-bl {
      position:absolute; bottom:0; left:0; width:42%; height:50%; pointer-events:none;
    }

    /* --- OCÉANO (playa atardecer) --- */
    #sbg-forest {
      background:linear-gradient(180deg,#e8501a 0%,#f07820 18%,#f8a030 35%,#ffc84a 48%,#ffda70 55%,#c89050 65%,#a06838 78%,#7a4820 100%);
    }
    .b-sun {
      position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
      width:72px; height:72px; border-radius:50%;
      background:radial-gradient(circle,#fffbe8 0%,#fff0a0 40%,#ffcc40 100%);
      box-shadow:0 0 40px 22px rgba(255,230,100,.5),0 0 100px 60px rgba(255,200,50,.22);
      animation:sunGlow 6s ease-in-out infinite alternate;
    }
    @keyframes sunGlow{
      from{box-shadow:0 0 40px 22px rgba(255,230,100,.42),0 0 100px 60px rgba(255,200,50,.18);}
      to{box-shadow:0 0 58px 30px rgba(255,240,120,.58),0 0 140px 85px rgba(255,215,70,.28);}
    }
    .b-cloud {
      position:absolute; border-radius:50px;
      background:rgba(255,220,160,.28); filter:blur(10px);
    }
    .b-c1{top:12%;left:5%;width:150px;height:32px;animation:cDrift 20s linear infinite;}
    .b-c2{top:22%;right:8%;width:110px;height:24px;animation:cDrift 28s linear infinite reverse;}
    .b-c3{top:30%;left:30%;width:80px;height:18px;animation:cDrift 16s linear infinite 4s;}
    @keyframes cDrift{from{transform:translateX(0);}to{transform:translateX(28px);}}
    .b-sea {
      position:absolute; bottom:25%; left:0; right:0; height:22%;
      background:linear-gradient(180deg,#b86820 0%,#844815 50%,#6a4228 100%);
    }
    .b-shore {
      position:absolute; bottom:0; left:0; right:0; height:26%;
      background:linear-gradient(180deg,#c89858 0%,#b88040 60%,#a87030 100%);
    }
    .b-wave {
      position:absolute; left:-8%; right:-8%; height:16px;
      background:rgba(255,255,255,.7); border-radius:50% 50% 0 0/80% 80% 0 0;
      filter:blur(2px);
    }
    .b-w1{bottom:25%;animation:waveIn 3.8s ease-in-out infinite;}
    .b-w2{bottom:27.5%;animation:waveIn 4.6s ease-in-out infinite .9s;opacity:.55;}
    .b-w3{bottom:29.5%;animation:waveIn 5.5s ease-in-out infinite 1.8s;opacity:.3;}
    @keyframes waveIn{
      0%{transform:scaleX(.9) translateX(-2%);opacity:.15;}
      35%{opacity:.8;}
      65%{transform:scaleX(1.08) translateX(2%);opacity:.95;}
      100%{transform:scaleX(.88) translateX(-1%);opacity:.15;}
    }
    .b-sparkles{position:absolute;bottom:25%;left:0;right:0;height:22%;pointer-events:none;}
    .b-sparkles::before{
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 5px 8px at 15% 40%, rgba(255,210,80,.7), transparent),
        radial-gradient(ellipse 4px 6px at 32% 60%, rgba(255,200,70,.6), transparent),
        radial-gradient(ellipse 6px 9px at 50% 35%, rgba(255,220,90,.65), transparent),
        radial-gradient(ellipse 4px 7px at 68% 55%, rgba(255,205,75,.6), transparent),
        radial-gradient(ellipse 5px 8px at 82% 42%, rgba(255,215,85,.55), transparent),
        radial-gradient(ellipse 3px 5px at 22% 70%, rgba(255,198,68,.5), transparent),
        radial-gradient(ellipse 4px 6px at 75% 68%, rgba(255,208,78,.45), transparent);
      animation:sparkleAnim 2.8s ease-in-out infinite alternate;
    }
    @keyframes sparkleAnim{from{opacity:.6;transform:scaleX(.92);}to{opacity:1;transform:scaleX(1.08);}}

    /* --- BOSQUE (rayos de luz) --- */
    #sbg-sunset {
      background:linear-gradient(180deg,#020904 0%,#071208 20%,#0e1c0b 45%,#162510 65%,#0c1808 85%,#060e04 100%);
    }
    .f-sunspot {
      position:absolute; top:26%; left:50%; transform:translate(-50%,-50%);
      width:55px; height:55px; border-radius:50%;
      background:radial-gradient(circle,#fff8e0 0%,#ffe070 50%,#ff9820 100%);
      box-shadow:0 0 55px 35px rgba(255,185,55,.38);
      animation:fSunGlow 7s ease-in-out infinite alternate;
    }
    @keyframes fSunGlow{from{box-shadow:0 0 55px 35px rgba(255,185,55,.32);}to{box-shadow:0 0 75px 48px rgba(255,205,75,.48);}}
    .f-ray {
      position:absolute; top:0;
      width:55px; height:100%;
      background:linear-gradient(180deg,rgba(255,205,85,.3) 0%,rgba(255,185,55,.09) 55%,transparent 100%);
      filter:blur(14px);
      transform-origin:top center;
      animation:rayPulse 7s ease-in-out infinite alternate;
    }
    .f-ray:nth-child(1){left:27%;transform:rotate(-10deg);animation-delay:0s;}
    .f-ray:nth-child(2){left:36%;transform:rotate(-5deg);animation-delay:1.4s;}
    .f-ray:nth-child(3){left:45%;transform:rotate(0deg);width:70px;animation-delay:.7s;}
    .f-ray:nth-child(4){left:56%;transform:rotate(5deg);animation-delay:2.1s;}
    .f-ray:nth-child(5){left:65%;transform:rotate(10deg);animation-delay:1.1s;}
    @keyframes rayPulse{from{opacity:.42;}to{opacity:1;}}
    .f-mist {
      position:absolute; bottom:12%; left:-25%; right:-25%; height:22%;
      background:radial-gradient(ellipse at 50% 100%,rgba(210,225,205,.22) 0%,transparent 70%);
      filter:blur(18px);
      animation:mistDrift 9s ease-in-out infinite alternate;
    }
    @keyframes mistDrift{from{transform:translateX(-4%);opacity:.65;}to{transform:translateX(4%);opacity:1;}}
    .f-ground {
      position:absolute; bottom:0; left:0; right:0; height:15%;
      background:linear-gradient(180deg,#0a1208 0%,#050a04 100%);
    }
    .f-trees { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

    /* --- ATARDECER (pájaro) --- */
    #sbg-night {
      background:linear-gradient(180deg,#180312 0%,#5a0810 18%,#b81820 38%,#dc3c10 54%,#e86018 68%,#d05018 82%,#b04010 100%);
    }
    .s-sun {
      position:absolute; top:58%; left:50%; transform:translate(-50%,-50%);
      width:82px; height:82px; border-radius:50%;
      background:radial-gradient(circle,#fff9d8 0%,#ffe090 40%,#ff8828 100%);
      box-shadow:0 0 55px 32px rgba(255,168,55,.48);
      animation:sPulse 7s ease-in-out infinite alternate;
    }
    @keyframes sPulse{from{box-shadow:0 0 55px 32px rgba(255,168,55,.42);}to{box-shadow:0 0 75px 48px rgba(255,188,75,.58);}}
    .s-cloud {
      position:absolute; filter:blur(4px);
      background:rgba(60,5,8,.88); border-radius:55% 45% 52% 38%/60% 42% 58% 40%;
    }
    .s-c1{top:6%;left:-4%;width:220px;height:65px;animation:sCDrift 22s linear infinite;}

<script>
var PATS = [
  { name:'Respiraci\u00f3n Cuadrada', timing:'4\u20134\u20134\u20134',
    phases:[{l:'Inhala',t:'inhale',d:4},{l:'Sost\u00e9n',t:'hold',d:4},{l:'Exhala',t:'exhale',d:4},{l:'Sost\u00e9n',t:'holdout',d:4}] },
  { name:'T\u00e9cnica 4-7-8', timing:'4\u20137\u20138',
    phases:[{l:'Inhala',t:'inhale',d:4},{l:'Sost\u00e9n',t:'hold',d:7},{l:'Exhala',t:'exhale',d:8}] },
  { name:'Respiraci\u00f3n Calmante', timing:'5\u20132\u20137',
    phases:[{l:'Inhala',t:'inhale',d:5},{l:'Sost\u00e9n',t:'hold',d:2},{l:'Exhala',t:'exhale',d:7}] },
  { name:'Energizante', timing:'3\u20133',
    phases:[{l:'Inhala',t:'inhale',d:3},{l:'Exhala',t:'exhale',d:3}] }
];

var BG = { ocean:'', forest:'forest', sunset:'sunset', night:'night' };
var cfg = { dur:3, scene:'ocean', pat:PATS[0], snd:'ocean' };
var state = { on:false, pIdx:0, sec:0, cyc:0, sessLeft:0 };
var tPhase=null, tSess=null, soundOn=true;
var actx=null, ambiGain=null, ambiNodes=[], audioBufs={};

var SOUND_URLS = {
  ocean: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/main/audio/ocean.mp3',
  river: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/main/audio/rain.mp3',
  wind:  'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/main/audio/wind.mp3',
  birds: 'https://raw.githubusercontent.com/bradtraversy/ambient-sound-mixer/main/audio/birds.mp3'
};

/* Audio */
function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}


function mkReverb(c,s){
  var len=c.sampleRate*s, buf=c.createBuffer(2,len,c.sampleRate);
  for(var ch=0;ch<2;ch++){ var d=buf.getChannelData(ch); for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2); }
  var conv=c.createConvolver(); conv.buffer=buf; return conv;
}

function loadBuf(url, cb) {
  var c = getCtx();
  if(audioBufs[url]) { cb(audioBufs[url]); return; }
  fetch(url)
    .then(function(r){ return r.arrayBuffer(); })
    .then(function(ab){ return c.decodeAudioData(ab); })
    .then(function(buf){ audioBufs[url]=buf; cb(buf); })
    .catch(function(e){ console.warn('Audio load failed', e); });
}

function startAmbience(){
  if(!soundOn || cfg.snd==='none') return;
  var c=getCtx();
  ambiGain=c.createGain();
  ambiGain.gain.setValueAtTime(0,c.currentTime);
  ambiGain.gain.linearRampToValueAtTime(0.7,c.currentTime+3);
  var rev=mkReverb(c,2), revG=c.createGain(); revG.gain.value=0.2;
  ambiGain.connect(rev); rev.connect(revG); revG.connect(c.destination);
  ambiGain.connect(c.destination);
  var url=SOUND_URLS[cfg.snd]; if(!url) return;
  loadBuf(url, function(buf){
    if(!ambiGain) return;
    var src=c.createBufferSource(); src.buffer=buf; src.loop=true;
    src.connect(ambiGain); src.start();
    ambiNodes.push(src);
  });
}

function stopAmbience(){
  if(!ambiGain||!actx) return;
  ambiGain.gain.linearRampToValueAtTime(0,actx.currentTime+1.5);
  var nodes=ambiNodes.slice(); ambiNodes=[];
  setTimeout(function(){ nodes.forEach(function(n){try{n.stop();}catch(e){}}); ambiGain=null; },1600);
}

function chime(freq,dur){
  if(!soundOn) return;
  var c=getCtx(), o=c.createOscillator(), g=c.createGain();
  o.type='sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(0,c.currentTime);
  g.gain.linearRampToValueAtTime(0.15,c.currentTime+0.1);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur);
}

function haptic() {
  if(navigator.vibrate) navigator.vibrate(40);
}

/* Build pattern buttons */
var patList=document.getElementById('patList');
PATS.forEach(function(p,i){
  var b=document.createElement('button');
  b.className='pat-btn'+(i===0?' on':'');
  b.innerHTML='<span class="pn">'+p.name+'</span><span class="pt">'+p.timing+'</span>';
  b.addEventListener('click',function(){
    cfg.pat=p;
    patList.querySelectorAll('.pat-btn').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
  });
  patList.appendChild(b);
});

/* Duration */
document.getElementById('durRow').addEventListener('click',function(e){
  var b=e.target.closest('.dur-btn'); if(!b) return;
  cfg.dur=parseInt(b.dataset.m,10);
  document.getElementById('durRow').querySelectorAll('.dur-btn').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');
});

/* Sound selector */
document.getElementById('soundRow').addEventListener('click',function(e){
  var b=e.target.closest('.dur-btn'); if(!b) return;
  cfg.snd=b.dataset.snd;
  document.getElementById('soundRow').querySelectorAll('.dur-btn').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');
});

/* Scene */
document.getElementById('scenesRow').addEventListener('click',function(e){
  var card=e.target.closest('.sc'); if(!card) return;
  cfg.scene=card.dataset.s;
  document.querySelectorAll('.sc').forEach(function(x){
    x.classList.remove('on');
    var dot=x.querySelector('.sc-dot');
    if(dot) dot.innerHTML='';
  });
  card.classList.add('on');
  var dot=card.querySelector('.sc-dot');
  if(dot) dot.innerHTML='&#10003;';
  var bg=document.getElementById('bg');
  bg.className=BG[cfg.scene]||'';
  bg.id='bg';
});

/* Sound */
document.getElementById('fab').addEventListener('click',function(){
  soundOn=!soundOn;
  this.textContent=soundOn?'\uD83D\uDD14':'\uD83D\uDD15';
  this.classList.toggle('off',!soundOn);
  if(!soundOn) stopAmbience(); else if(state.on) startAmbience();
});

/* Begin */
document.getElementById('btnBegin').addEventListener('click',function(){
  getCtx();
  document.getElementById('setup').classList.add('out');
  document.getElementById('sess').classList.remove('below');
  begin();
});

/* End */
document.getElementById('btnEnd').addEventListener('click',finish);

/* Helpers */
function fmt(s){ var m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }

function activateScene(s){
  document.querySelectorAll('.sbg').forEach(function(el){ el.classList.remove('active'); });
  var el=document.getElementById('sbg-'+s);
  if(el) el.classList.add('active');
}

function begin(){
  state.on=true; state.pIdx=0; state.cyc=0;
  state.sessLeft=cfg.dur*60;
  document.getElementById('sCycle').textContent='';
  document.getElementById('clock').textContent=fmt(state.sessLeft);
  activateScene(cfg.scene);
  startAmbience();
  tSess=setInterval(function(){
    state.sessLeft--;
    document.getElementById('clock').textContent=fmt(state.sessLeft);
    if(state.sessLeft<=0) finish();
  },1000);
  runPhase();
}

function runPhase(){
  if(!state.on) return;
  var ph=cfg.pat.phases[state.pIdx];
  state.sec=ph.d;
  document.documentElement.style.setProperty('--iDur',ph.d+'s');
  document.documentElement.style.setProperty('--eDur',ph.d+'s');
  document.getElementById('orb').className='orb '+ph.t;
  document.getElementById('sPhase').textContent=ph.l;
  document.getElementById('sCount').textContent=state.sec;
  haptic();
  if(ph.t==='inhale') chime(528,1.1);
  else if(ph.t==='exhale') chime(396,1.1);
  else chime(432,0.7);
  tPhase=setInterval(function(){
    state.sec--;
    document.getElementById('sCount').textContent=state.sec>0?state.sec:'';
    if(state.sec<=0){
      clearInterval(tPhase);
      state.pIdx++;
      if(state.pIdx>=cfg.pat.phases.length){ state.pIdx=0; state.cyc++; document.getElementById('sCycle').textContent='Ciclo '+state.cyc; }
      runPhase();
    }
  },1000);
}

function finish(){
  state.on=false;
  clearInterval(tPhase); clearInterval(tSess);
  stopAmbience();
  document.querySelectorAll('.sbg').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('orb').className='orb';
  document.getElementById('sPhase').textContent='Sesi\u00f3n completa';
  document.getElementById('sCount').textContent='';
  document.getElementById('sCycle').textContent=state.cyc+(state.cyc===1?' ciclo':' ciclos');
  setTimeout(function(){
    document.getElementById('sess').classList.add('below');
    document.getElementById('setup').classList.remove('out');
    document.getElementById('sPhase').textContent='';
    document.getElementById('sCycle').textContent='';
  },3000);
}
</script>
